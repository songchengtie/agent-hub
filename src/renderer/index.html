<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Hub</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <header>
          <h1>Agent Hub</h1>
          <p>Codex + Hermes + opencode</p>
        </header>
        <section>
          <h2 data-i18n="language">Language</h2>
          <select id="language" class="language-select" aria-label="Language">
            <option value="zh">&#20013;&#25991;</option>
            <option value="en">English</option>
          </select>
        </section>
        <section>
          <h2 data-i18n="privateChat">Private</h2>
          <div id="private-list" class="private-list"></div>
        </section>
        <section>
          <h2 data-i18n="agents">Agents</h2>
          <div id="agents" class="agent-list"></div>
        </section>
        <section>
          <div class="section-head">
            <h2 data-i18n="memory">Memory</h2>
            <button id="refresh-memory" class="ghost-button" type="button" data-i18n="refreshMemory">Refresh</button>
          </div>
          <div id="memory-panel" class="memory-panel"></div>
        </section>
        <section>
          <h2 data-i18n="policy">Policy</h2>
          <ul id="policy-list" class="policy"></ul>
        </section>
      </aside>

      <section class="chat">
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <textarea id="message" rows="3" placeholder="Ask the group..."></textarea>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
